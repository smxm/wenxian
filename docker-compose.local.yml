services:
  api:
    build:
      context: ./literature_screening
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${APP_DATA_DIR:-./literature_screening/data/api_runs}:/app/data/api_runs
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    build:
      context: ./literature_screening_web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./literature_screening_web/deploy/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
