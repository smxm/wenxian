services:
  api:
    build:
      context: ./literature_screening
      dockerfile: Dockerfile
    container_name: literature-screening-api
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${APP_DATA_DIR:-./server-data/api_runs}:/app/data/api_runs
    expose:
      - "8000"

  web:
    build:
      context: ./literature_screening_web
      dockerfile: Dockerfile
    container_name: literature-screening-web
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ${BASIC_AUTH_FILE:-./deploy/.htpasswd}:/etc/nginx/.htpasswd:ro
    ports:
      - "80:80"
