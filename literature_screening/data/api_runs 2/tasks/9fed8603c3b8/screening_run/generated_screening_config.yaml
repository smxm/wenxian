project:
  name: new-screening-run
  output_dir: tasks/9fed8603c3b8/screening_run/screening_output
  save_raw_response: true
  save_intermediate_files: true
input:
  input_files:
  - tasks/9fed8603c3b8/screening_run/inputs/scopus_export_Mar 29-2026_e4cd08bd-6551-48a8-b84c-9f960fc7d3ba.ris
  encoding: auto
dedup:
  enabled: true
  strict_doi_match: true
  normalized_title_exact_match: true
  fuzzy_title_match: false
screening:
  batch_size: 10
  target_include_count: 10
  stop_when_target_reached: true
  allow_uncertain: true
  retry_times: 6
  request_timeout_seconds: 240
criteria:
  topic: 隐球菌侵袭血脑屏障的机制与高级体外血脑屏障模型（微流控/器官芯片）构建
  inclusion:
  - 机制类：深入探讨隐球菌（或相关重要真菌/病原体）跨越血脑屏障的具体分子机制（如受体结合、紧密连接破坏、特洛伊木马机制等）。
  - 模型类：详细阐述高级体外血脑屏障模型（如微生理系统、器官芯片、微流控系统、诱导多能干细胞(iPSC)衍生模型等）的构建方法、参数设置及功能评估。
  exclusion:
  - 仅讨论隐球菌肺部感染或其他非中枢神经系统（CNS）感染。
  - 采用传统常规的二维静态细胞培养，且无明显方法学突破或仿生设计的文章。
  - 缺乏深层机制探讨的纯临床病例报告、流行病学统计或常规药物疗效对比。
model:
  provider: deepseek
  model_name: deepseek-chat
  api_base_url: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.0
  max_tokens: 1536
  min_request_interval_seconds: 2.0
report:
  export_included_ris: true
  export_excluded_ris: false
  export_unused_ris: true
  export_included_bib: false
  export_excluded_bib: false
  export_unused_bib: false
  included_report_format: md
  excluded_report_format: md
  summary_format: json
