project:
  name: new-screening-run
  output_dir: tasks/abacc60e9134/screening_run/screening_output
  save_raw_response: true
  save_intermediate_files: true
input:
  input_files:
  - tasks/abacc60e9134/screening_run/inputs/savedrecs.ris
  encoding: auto
dedup:
  enabled: true
  strict_doi_match: true
  normalized_title_exact_match: true
  fuzzy_title_match: false
screening:
  batch_size: 10
  target_include_count: 10
  stop_when_target_reached: true
  allow_uncertain: true
  retry_times: 6
  request_timeout_seconds: 240
criteria:
  topic: 基于BIM技术的某项目施工图预算
  inclusion:
  - 必须涉及 BIM 技术（特别是 5D BIM）在项目造价、成本估算、工程量算量（QTO）或施工图预算编制中的直接应用。
  - 研究内容包含具体项目的应用案例、传统预算与BIM预算的对比（效率、准确率）、或造价数据互操作性（如 IFC 标准、Revit 与造价软件的数据交互）。
  - 属于高质量的实证研究、案例分析或系统性综述。
  exclusion:
  - 仅停留在 3D 建模、碰撞检查或 4D 进度管理，未实质性涉及造价成本（5D）数据的文献。
  - 侧重于施工阶段后的设施运维（FM）、结构力学分析或纯建筑设计的文献。
  - 无实际工程背景依托的纯理论算法推导，或非建筑/土木工程领域的文献。
model:
  provider: deepseek
  model_name: deepseek-chat
  api_base_url: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.0
  max_tokens: 1536
  min_request_interval_seconds: 2.0
report:
  export_included_ris: true
  export_excluded_ris: false
  export_unused_ris: true
  export_included_bib: false
  export_excluded_bib: false
  export_unused_bib: false
  included_report_format: md
  excluded_report_format: md
  summary_format: json
