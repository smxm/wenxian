project:
  name: "burrowing-robot-small-batch"
  output_dir: "../data/output/run_small_batch"
  save_raw_response: true
  save_intermediate_files: true

input:
  input_files:
    - "../../scopus_export_Mar 20-2026_228ffd90-f18c-466f-9035-51f6400cf2c1.bib"
  encoding: "utf-8"

dedup:
  enabled: true
  strict_doi_match: true
  normalized_title_exact_match: true
  fuzzy_title_match: false

screening:
  batch_size: 20
  target_include_count: 50
  stop_when_target_reached: true
  allow_uncertain: true
  retry_times: 2
  request_timeout_seconds: 120

criteria:
  topic: "地下钻进机器人推进与破土机制"
  inclusion:
    - "研究对象必须为能在土壤、砂土、行星风化层或地表以下介质中推进或挖掘的机器人系统"
    - "重点关注推进、破土、钻进、切削、冲击、振动液化、仿生掘进、生长式推进等机制"
    - "涉及机构设计、运动学建模、机器人与颗粒介质相互作用或实验验证"
  exclusion:
    - "传统大型工业掘进设备"
    - "仅在既有管道内移动且不具备自主破土能力的管道机器人"
    - "纯水下机器人或纯空中飞行器"
    - "无机器人载体背景的纯土力学或纯地质研究"

model:
  provider: "kimi"
  model_name: "moonshot-v1-auto"
  api_base_url: "https://api.moonshot.cn/v1"
  api_key_env: "KIMI_API_KEY"
  temperature: 0.1

report:
  export_included_bib: true
  export_excluded_bib: true
  export_unused_bib: true
  included_report_format: "md"
  excluded_report_format: "md"
  summary_format: "json"
