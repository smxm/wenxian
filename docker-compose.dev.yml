services:
  api:
    build:
      context: ./literature_screening
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./literature_screening:/app
      - ${APP_DATA_DIR:-./literature_screening/data/api_runs}:/app/data/api_runs
    ports:
      - "${API_PORT:-8000}:8000"
    command:
      - uvicorn
      - literature_screening.api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  web:
    image: node:22-alpine
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://api:8000
      VITE_DEV_SERVER_PORT: "5173"
      VITE_HMR_CLIENT_PORT: "${WEB_PORT:-8080}"
    volumes:
      - ./literature_screening_web:/app
      - literature_screening_web_node_modules:/app/node_modules
    ports:
      - "${WEB_PORT:-8080}:5173"
    command:
      - sh
      - -lc
      - |
          current_lockfile_sha="$$(sha1sum package-lock.json | awk '{print $$1}')"
          cached_lockfile_sha="$$(cat node_modules/.package-lock.sha1 2>/dev/null || true)"
          if [ ! -x node_modules/.bin/vite ] || [ "$$current_lockfile_sha" != "$$cached_lockfile_sha" ]; then
            npm config set registry https://registry.npmmirror.com
            npm ci
            printf '%s' "$$current_lockfile_sha" > node_modules/.package-lock.sha1
          fi
          npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  literature_screening_web_node_modules:
